<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>GTA UKRAINE RP - ПРАВИЛА</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: Arial, sans-serif;
            padding: 30px;
            text-align: center;
            line-height: 1.6;
        }
        h1 {
            color: #00ff9d;
            text-shadow: 0 0 30px #00ff41;
            font-size: 2.8em;
        }
        .rule {
            background: #111;
            border: 2px solid #00ff41;
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            max-width: 850px;
            text-align: left;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
        }
        .number {
            color: #00ff9d;
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>ПРАВИЛА GTA UKRAINE RP</h1>
    <p>Серверні правила • Оновлено 2026</p>

    <div class="rule">
        <span class="number">1.</span> <strong>Загальні правила</strong><br>
        Поважайте гравців. Заборонено токсичність, метагейм, читерство.
    </div>

    <div class="rule">
        <span class="number">2.</span> <strong>Рольова гра (RP)</strong><br>
        Грайте реалістично. Використовуйте голосовий чат для взаємодії.
    </div>

    <div class="rule">
        <span class="number">3.</span> <strong>Зброя та PvP</strong><br>
        Дотримуйтесь правил на рейди та DeathMatch.
    </div>

    <!-- Додавай сюди інші правила по бажанню -->

</body>
</html
